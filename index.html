function resizeCanvas() {
    const aspect = W / H;
    let cw = window.innerWidth, ch = window.innerHeight;
    if (cw / ch > aspect) { cw = ch * aspect; } else { ch = cw / aspect; }
    canvas.style.width = cw + 'px';

}

function drawSprite(x, y, data, palette, scale) {
    scale = scale || 4;
    const sz = data.length;
    for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
            const colorKey = data[r][c];
            const color = palette[colorKey];
            if (color && color !== 'transparent') {
                ctx.fillStyle = color;
                ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
            }
        }
    }
}

// ============================================================
// HIGH SCORES (localStorage)
// ============================================================
const HS_KEY = 'mrdo_highscores';
const HS_MAX = 10;

function loadHighScores() {
    try {
        const data = localStorage.getItem(HS_KEY);
        if (data) {
            const parsed = JSON.parse(data);
            if (Array.isArray(parsed)) return parsed.slice(0, HS_MAX);
        }
    } catch (e) {}
    // Default table
    return [
        { name: 'MRD', score: 5000, level: 5 },
        { name: 'DOO', score: 4000, level: 4 },
        { name: 'ACE', score: 3000, level: 3 },
        { name: 'PRO', score: 2000, level: 2 },
        { name: 'NEW', score: 1000, level: 1 },
    ];
}

function saveHighScores(scores) {
    try {
        localStorage.setItem(HS_KEY, JSON.stringify(scores.slice(0, HS_MAX)));
    } catch (e) {}
}

let highScores = loadHighScores();

function getHighScoreRank(score) {
    if (score <= 0) return -1;
    for (let i = 0; i < highScores.length; i++) {
        if (score > highScores[i].score) return i;
    }
    if (highScores.length < HS_MAX) return highScores.length;
    return -1;
}

function insertHighScore(rank, name, score, level) {
    highScores.splice(rank, 0, { name, score, level });
    if (highScores.length > HS_MAX) highScores.length = HS_MAX;
    saveHighScores(highScores);
}

function createPlayer() {

}

// ============================================================
// LEVEL GENERATOR
// ============================================================
function generateLevel(levelNum) {
    const grid = [];
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = T_DIRT;
        }
    }

    // Carve tunnels from template
    const template = LEVEL_TEMPLATES[(levelNum - 1) % LEVEL_TEMPLATES.length];
    for (const seg of template.tunnels) {
        if (seg.type === 'h') {
            for (let c = seg.c1; c <= seg.c2; c++) {
                if (seg.row >= 0 && seg.row < ROWS && c >= 0 && c < COLS)
                    grid[seg.row][c] = T_TUNNEL;
            }
        } else {
            for (let r = seg.r1; r <= seg.r2; r++) {
                if (r >= 0 && r < ROWS && seg.col >= 0 && seg.col < COLS)
                    grid[r][seg.col] = T_TUNNEL;
            }
        }
    }

    // Carve generator room (3x3 centered)
    const genCol = 6, genRow = 7;
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            const r = genRow + dr, c = genCol + dc;
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS)
                grid[r][c] = T_TUNNEL;
        }
    }

    // Carve player start area
    const pCol = 1, pRow = ROWS - 2;
    grid[pRow][pCol] = T_TUNNEL;
    grid[pRow][pCol + 1] = T_TUNNEL;
    grid[pRow - 1][pCol] = T_TUNNEL;

    // Place cherry clusters (groups of 8, arranged as 2x4)
    const cherryGroups = [];
    const numGroups = 5 + (levelNum % 3);
    let attempts = 0;
    while (cherryGroups.length < numGroups && attempts < 200) {
        attempts++;
        // Try 2x4 arrangement
        const startR = 1 + Math.floor(Math.random() * (ROWS - 3));
        const startC = 1 + Math.floor(Math.random() * (COLS - 5));

        // Check if area is all dirt
        let valid = true;
        const positions = [];
        for (let r = 0; r < 2 && valid; r++) {
            for (let c = 0; c < 4 && valid; c++) {
                const gr = startR + r, gc = startC + c;
                if (gr < 0 || gr >= ROWS || gc < 0 || gc >= COLS) { valid = false; break; }
                if (grid[gr][gc] !== T_DIRT) { valid = false; break; }
                // Check not adjacent to generator
                if (Math.abs(gr - genRow) <= 2 && Math.abs(gc - genCol) <= 2) { valid = false; break; }
                // Check not overlapping existing cherry groups (with margin)
                for (const grp of cherryGroups) {
                    for (const p of grp.positions) {
                        if (Math.abs(p.r - gr) <= 1 && Math.abs(p.c - gc) <= 1) { valid = false; break; }
                    }
                    if (!valid) break;
                }
                if (valid) positions.push({ r: gr, c: gc });
            }
        }

        if (valid && positions.length === 8) {
            for (const p of positions) grid[p.r][p.c] = T_CHERRY;
            cherryGroups.push({ id: cherryGroups.length, positions, collected: 0 });
        }
    }

    // Place apples
    const apples = [];
    const numApples = Math.min(3 + Math.floor(levelNum / 2), 6);
    let appleAttempts = 0;
    while (apples.length < numApples && appleAttempts < 200) {
        appleAttempts++;
        const ac = 1 + Math.floor(Math.random() * (COLS - 2));
        const ar = 1 + Math.floor(Math.random() * (ROWS - 3));

        // Apple should be on a tunnel tile, ideally with tunnel or edge below
        if (grid[ar][ac] !== T_TUNNEL) continue;
        // Not on generator
        if (Math.abs(ar - genRow) <= 1 && Math.abs(ac - genCol) <= 1) continue;
        // Not on player start
        if (ar === pRow && ac === pCol) continue;
        // Not overlapping existing apples
        if (apples.some(a => a.col === ac && a.row === ar)) continue;

        apples.push(createApple(ac, ar));
    }

    // Count total cherries
    let totalCherries = 0;
    for (const grp of cherryGroups) totalCherries += grp.positions.length;

    return { grid, cherryGroups, apples, totalCherries, genCol, genRow, pCol, pRow };
}

function createApple(col, row) {
    return {
        col, row,
        x: col * TILE,
        y: FIELD_Y + row * TILE,
        state: 'SETTLED', // SETTLED, WOBBLING, FALLING, PUSHED, SHATTERED
        fallSpeed: 0,
        fallStartRow: row,
        pushDir: DIR_NONE,
        pushTarget: 0,
        wobbleTimer: 0,
        crushCount: 0,
        wobbleAnim: 0,
    };
}

function initLevel(levelNum) {
    const data = generateLevel(levelNum);
    game.grid = data.grid;
    game.cherryGroups = data.cherryGroups;
    game.apples = data.apples;
    game.totalCherries = data.totalCherries;
    game.collectedCherries = 0;
    game.enemies = [];
    game.alphaMonster = null;

    const enemyCount = Math.min(4 + Math.floor(levelNum * 1.5), 18);
    game.generator = {
        col: data.genCol, row: data.genRow,
        active: true,
        enemiesRemaining: enemyCount,
    };
    game.totalEnemiesInLevel = enemyCount;
    game.totalEnemiesKilled = 0;
    game.spawnTimer = SPAWN_DELAY_INITIAL;

    // Reset player position
    game.player.col = data.pCol;
    game.player.row = data.pRow;
    game.player.x = data.pCol * TILE;
    game.player.y = FIELD_Y + data.pRow * TILE;
    game.player.dir = DIR_RIGHT;
    game.player.nextDir = DIR_NONE;
    game.player.moving = false;
    game.player.hasBall = true;
    game.player.ballUseCount = 0;
    game.player.ballRegenTimer = 0;
    game.player.invincible = 0;

    game.ball.active = false;
    game.particles = [];
    game.time = 0;
}

// ============================================================
// INPUT HANDLING
// ============================================================
const keys = {};
let isTouchDevice = false;
let touchDir = DIR_NONE;
let touchFire = false;

document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','Enter'].includes(e.code))
        e.preventDefault();

    // Music toggle (M key)
    if (e.code === 'KeyM' && game.state !== STATE_ENTER_NAME) {
        toggleMusic();
        return;
    }

    // Pause toggle (P or Escape)
    if (e.code === 'KeyP' || e.code === 'Escape') {
        if (game.state === STATE_PAUSED) {
            game.state = game.pausedFrom;
            if (!musicMuted && (game.pausedFrom === STATE_PLAYING)) startGameplayMusic();
        } else if (game.state === STATE_PLAYING || game.state === STATE_READY) {
            game.pausedFrom = game.state;
            game.state = STATE_PAUSED;
            stopMusic();
        }
        return;
    }

    // Name entry handling
    if (game.state === STATE_ENTER_NAME) {
        const ne = game.nameEntry;
        if (e.code === 'ArrowUp' || e.code === 'KeyW') {
            const c = ne.letters[ne.pos].charCodeAt(0);
            ne.letters[ne.pos] = String.fromCharCode(c >= 90 ? 65 : c + 1); // A-Z wrap
        } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            const c = ne.letters[ne.pos].charCodeAt(0);
            ne.letters[ne.pos] = String.fromCharCode(c <= 65 ? 90 : c - 1);
        } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
            ne.pos = Math.min(ne.pos + 1, 2);
        } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
            ne.pos = Math.max(ne.pos - 1, 0);
        } else if (e.code === 'Enter' || e.code === 'Space') {
            if (ne.pos < 2) {
                ne.pos++;
            } else {
                // Confirm entry
                const name = ne.letters.join('');
                insertHighScore(game.newHighScoreRank, name, game.score, game.level);
                game.state = STATE_GAME_OVER;
                game.stateTimer = 0;
            }
        } else if (e.key.length === 1 && e.key.match(/[a-zA-Z]/)) {
            ne.letters[ne.pos] = e.key.toUpperCase();
            if (ne.pos < 2) ne.pos++;
        }
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchDir = DIR_NONE;
    touchFire = false;
}, { passive: false });

function handleTouch(e) {
    e.preventDefault();
    isTouchDevice = true;
    touchDir = DIR_NONE;
    touchFire = false;
    const rect = canvas.getBoundingClientRect();
    for (let i = 0; i < e.touches.length; i++) {
        const t = e.touches[i];
        const tx = (t.clientX - rect.left) / rect.width;
        const ty = (t.clientY - rect.top) / rect.height;

        if (tx < 0.45 && ty > 0.65) {
            // D-pad zone (bottom-left)
            const cx = 0.18, cy = 0.85;
            const dx = tx - cx, dy = ty - cy;
            if (Math.abs(dx) > 0.03 || Math.abs(dy) > 0.03) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    touchDir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
                } else {
                    touchDir = dy > 0 ? DIR_DOWN : DIR_UP;
                }
            }
        } else if (tx > 0.65 && ty > 0.7) {
            // Fire button (bottom-right)
            touchFire = true;
        }
    }
}

function getInputDir() {
    if (keys['ArrowUp'] || keys['KeyW']) return DIR_UP;
    if (keys['ArrowDown'] || keys['KeyS']) return DIR_DOWN;
    if (keys['ArrowLeft'] || keys['KeyA']) return DIR_LEFT;
    if (keys['ArrowRight'] || keys['KeyD']) return DIR_RIGHT;
    if (touchDir !== DIR_NONE) return touchDir;
    return DIR_NONE;
}

function isBallThrow() {
    return keys['Space'] || keys['KeyZ'] || touchFire;
}

function anyKeyPressed() {
    return Object.values(keys).some(v => v) || touchDir !== DIR_NONE || touchFire;
}

// SOUND EFFECTS (Web Audio API)
// ============================================================
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    try { ensureAudio(); } catch(e) { return; }
    const ac = audioCtx;
    const now = ac.currentTime;
    const g = ac.createGain();
    g.connect(ac.destination);

    switch (type) {
        case 'throw': {
            const o = ac.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(300, now);
            o.frequency.linearRampToValueAtTime(900, now + 0.12);
            g.gain.setValueAtTime(0.2, now);
            g.gain.linearRampToValueAtTime(0, now + 0.12);
            o.connect(g);
            o.start(now); o.stop(now + 0.12);
            break;
        }
        case 'bounce': {
            const o = ac.createOscillator();
            o.type = 'square';
            o.frequency.setValueAtTime(600, now);
            o.frequency.linearRampToValueAtTime(400, now + 0.05);
            g.gain.setValueAtTime(0.12, now);
            g.gain.linearRampToValueAtTime(0, now + 0.05);
            o.connect(g);
            o.start(now); o.stop(now + 0.05);
            break;
        }
        case 'cherry': {
            const o = ac.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(800, now);
            o.frequency.linearRampToValueAtTime(1200, now + 0.08);
            g.gain.setValueAtTime(0.15, now);
            g.gain.linearRampToValueAtTime(0, now + 0.08);
            o.connect(g);
            o.start(now); o.stop(now + 0.08);
            break;
        }
        case 'cherryBonus': {
            for (let i = 0; i < 3; i++) {
                const o = ac.createOscillator();
                const gg = ac.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(600 + i * 200, now + i * 0.1);
                gg.gain.setValueAtTime(0.15, now + i * 0.1);
                gg.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.1);
                o.connect(gg); gg.connect(ac.destination);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.1);
            }
            break;
        }
        case 'enemyDie': {
            const o = ac.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(500, now);
            o.frequency.linearRampToValueAtTime(100, now + 0.2);
            g.gain.setValueAtTime(0.15, now);
            g.gain.linearRampToValueAtTime(0, now + 0.2);
            o.connect(g);
            o.start(now); o.stop(now + 0.2);
            break;
        }
        case 'playerDie': {
            const o = ac.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(400, now);
            o.frequency.linearRampToValueAtTime(50, now + 0.6);
            g.gain.setValueAtTime(0.2, now);
            g.gain.linearRampToValueAtTime(0, now + 0.6);
            o.connect(g);
            o.start(now); o.stop(now + 0.6);
            break;
        }
        case 'appleCrush': {
            const buf = ac.createBufferSource();
            const buffer = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.05));
            buf.buffer = buffer;
            g.gain.setValueAtTime(0.2, now);
            g.gain.linearRampToValueAtTime(0, now + 0.2);
            buf.connect(g);
            buf.start(now);
            break;
        }
        case 'wobble': {
            const o = ac.createOscillator();
            o.type = 'triangle';
            o.frequency.setValueAtTime(200, now);
            const lfo = ac.createOscillator();
            const lfoGain = ac.createGain();
            lfo.frequency.setValueAtTime(8, now);
            lfoGain.gain.setValueAtTime(0.15, now);
            lfo.connect(lfoGain);
            lfoGain.connect(g.gain);
            g.gain.setValueAtTime(0.1, now);
            o.connect(g);
            o.start(now); o.stop(now + 0.5);
            lfo.start(now); lfo.stop(now + 0.5);
            break;
        }
        case 'extraLetter': {
            const o = ac.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(1000, now);
            g.gain.setValueAtTime(0.2, now);
            g.gain.linearRampToValueAtTime(0, now + 0.3);
            o.connect(g);
            o.start(now); o.stop(now + 0.3);
            const o2 = ac.createOscillator();
            const g2 = ac.createGain();
            o2.type = 'sine';
            o2.frequency.setValueAtTime(1500, now);
            g2.gain.setValueAtTime(0.15, now);
            g2.gain.linearRampToValueAtTime(0, now + 0.3);
            o2.connect(g2); g2.connect(ac.destination);
            o2.start(now); o2.stop(now + 0.3);
            break;
        }
        case 'levelComplete': {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const o = ac.createOscillator();
                const gg = ac.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(freq, now + i * 0.15);
                gg.gain.setValueAtTime(0.18, now + i * 0.15);
                gg.gain.linearRampToValueAtTime(0, now + i * 0.15 + 0.2);
                o.connect(gg); gg.connect(ac.destination);
                o.start(now + i * 0.15); o.stop(now + i * 0.15 + 0.2);
            });
            break;
        }
        case 'spawn': {
            const o = ac.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(80, now);
            o.frequency.linearRampToValueAtTime(120, now + 0.2);
            g.gain.setValueAtTime(0.1, now);
            g.gain.linearRampToValueAtTime(0, now + 0.3);
            o.connect(g);
            o.start(now); o.stop(now + 0.3);
            break;
        }
        case 'dig': {
            const buf = ac.createBufferSource();
            const buffer = ac.createBuffer(1, ac.sampleRate * 0.04, ac.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5 * Math.exp(-i / (ac.sampleRate * 0.01));
            buf.buffer = buffer;
            g.gain.setValueAtTime(0.06, now);
            buf.connect(g);
            buf.start(now);
            break;
        }
    }
}

let music = {
    playing: false,
    melody: null,
    noteIndex: 0,
    noteTimer: 0,
    bpm: 220,
    oscillator: null,
    gainNode: null,
    volume: 0.08,
    loop: true,
};

function startMusic(melody, bpm, loop, volume) {
    stopMusic();
    if (musicMuted) return;
    try { ensureAudio(); } catch(e) { return; }
    music.melody = melody;
    music.noteIndex = 0;
    music.noteTimer = 0;
    music.bpm = bpm || 220;
    music.loop = loop !== false;
    music.volume = volume || 0.08;
    music.playing = true;

    music.gainNode = audioCtx.createGain();
    music.gainNode.gain.setValueAtTime(music.volume, audioCtx.currentTime);
    music.gainNode.connect(audioCtx.destination);
}

function stopMusic() {
    music.playing = false;
    if (music.oscillator) {
        try { music.oscillator.stop(); } catch(e) {}
        music.oscillator = null;
    }
    if (music.gainNode) {
        try { music.gainNode.disconnect(); } catch(e) {}
        music.gainNode = null;
    }
}

function startGameplayMusic() {
    const m = GAME_MELODIES[currentMelodyIndex];
    startMusic(m.melody, m.bpm, true, 0.08);
}

function startTitleMusic() {
    currentMelodyIndex = 0;
    startMusic(CANCAN_MELODY, 180, true, 0.05);
}

function updateMusic(dt) {
    if (!music.playing || !music.melody || !audioCtx || musicMuted) return;

    music.noteTimer -= dt;
    if (music.noteTimer <= 0) {
        const beatDuration = 60 / music.bpm;
        const note = music.melody[music.noteIndex];
        const freq = note[0];
        const beats = note[1];
        const duration = beats * beatDuration;

        if (music.oscillator) {
            try { music.oscillator.stop(); } catch(e) {}
            music.oscillator = null;
        }

        if (freq > 0 && music.gainNode) {
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            const noteGain = audioCtx.createGain();
            noteGain.gain.setValueAtTime(music.volume, audioCtx.currentTime);
            noteGain.gain.setValueAtTime(music.volume * 0.8, audioCtx.currentTime + duration * 0.7);
            noteGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration * 0.95);

            osc.connect(noteGain);
            noteGain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
            music.oscillator = osc;
        }

        music.noteTimer = duration;
        music.noteIndex++;

        if (music.noteIndex >= music.melody.length) {
            if (music.loop) {
                music.noteIndex = 0;
            } else {
                stopMusic();
            }
        }
    }
}

    for (let i = 0; i < count; i++) {

            vy: Math.sin(angle) * spd,
            life: life * (0.5 + Math.random() * 0.5),
            maxLife: life,
            color,
            size: 2 + Math.random() * 3,
        });
    }
}

function updateParticles(dt) {
    game.particles = game.particles.filter(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 80 * dt; // gravity
        p.life -= dt;
        return p.life > 0;
    });
}

function renderParticles() {
    for (const p of game.particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

// ============================================================
// PLAYER LOGIC
// ============================================================
function tileAt(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return -1;
    return game.grid[row][col];
}

function isAligned(entity) {
    const px = entity.col * TILE;
    const py = FIELD_Y + entity.row * TILE;
    return Math.abs(entity.x - px) < 2 && Math.abs(entity.y - py) < 2;
}

function snapToGrid(entity) {
    entity.x = entity.col * TILE;
    entity.y = FIELD_Y + entity.row * TILE;
}

function appleAt(col, row) {
    return game.apples.find(a => a.col === col && a.row === row && a.state !== 'SHATTERED');
}

function canPlayerMove(col, row, dir) {
    const nc = col + DX[dir];
    const nr = row + DY[dir];
    if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) return false;

    // Check for apple blocking
    const apple = appleAt(nc, nr);
    if (apple) {
        // Can push apples left/right only
        if (dir === DIR_LEFT || dir === DIR_RIGHT) {
            const pushTarget = nc + DX[dir];
            if (pushTarget < 0 || pushTarget >= COLS) return false;
            if (tileAt(pushTarget, nr) === T_DIRT) return false;
            if (appleAt(pushTarget, nr)) return false;
            return true;
        }
        return false;
    }
    return true;
}

function collectCherry(row, col) {
    if (game.grid[row][col] !== T_CHERRY) return;
    game.grid[row][col] = T_TUNNEL;
    game.score += SCORE_CHERRY;
    game.collectedCherries++;
    playSound('cherry');
    spawnParticles(col * TILE + TILE / 2, FIELD_Y + row * TILE + TILE / 2, '#FFFF00', 5, 60, 0.4);

    for (const grp of game.cherryGroups) {
        const found = grp.positions.find(p => p.r === row && p.c === col);
        if (found) {
            grp.collected++;
            if (grp.collected === 8) {
                game.score += SCORE_CHERRY_GROUP;
                playSound('cherryBonus');
                spawnParticles(col * TILE + TILE / 2, FIELD_Y + row * TILE + TILE / 2, '#FF00FF', 12, 100, 0.6);
            }
            break;
        }
    }
}

let lastDigSound = 0;

function updatePlayer(dt) {
    const p = game.player;
    if (p.invincible > 0) p.invincible -= dt;

    // Animation
    if (p.moving) {
        p.animTimer += dt;
        if (p.animTimer > 0.12) {
            p.animTimer = 0;
            p.animFrame = (p.animFrame + 1) % 2;
        }
    }

    // Input
    const inputDir = getInputDir();
    if (inputDir !== DIR_NONE) {
        p.nextDir = inputDir;
    } else {
        p.nextDir = DIR_NONE;
    }

    // Ball throw
    if (isBallThrow() && p.hasBall && !game.ball.active) {
        throwBall();
    }

    // Tile-aligned movement — only process on arrival, not while departing
    if (isAligned(p) && !p.departed) {
        snapToGrid(p);

        // Collect cherry at current position
        collectCherry(p.row, p.col);

        // Only move if a direction key is actively held
        let moveDir = DIR_NONE;
        if (p.nextDir !== DIR_NONE && canPlayerMove(p.col, p.row, p.nextDir)) {
            moveDir = p.nextDir;
        }

        if (moveDir !== DIR_NONE) {
            p.dir = moveDir;
            p.moving = true;
            p.departed = true;

            // Push apple if needed
            const nc = p.col + DX[moveDir];
            const nr = p.row + DY[moveDir];
            const apple = appleAt(nc, nr);
            if (apple && (moveDir === DIR_LEFT || moveDir === DIR_RIGHT)) {
                const pushTarget = nc + DX[moveDir];
                apple.state = 'PUSHED';
                apple.pushDir = moveDir;
                apple.pushTarget = pushTarget;
            }

            // Dig through dirt
            if (game.grid[nr][nc] === T_DIRT) {
                game.grid[nr][nc] = T_TUNNEL;
                if (game.time - lastDigSound > 0.08) {
                    playSound('dig');
                    lastDigSound = game.time;
                }
            } else if (game.grid[nr][nc] === T_CHERRY) {
                collectCherry(nr, nc);
            }
        } else {
            p.moving = false;
        }
    } else if (isAligned(p) && p.departed && p.nextDir === DIR_NONE) {
        // Player released key while still near departure tile — stop here
        snapToGrid(p);
        p.moving = false;
        p.departed = false;
    }

    // Move pixel position
    if (p.moving) {
        const speed = PLAYER_SPEED * TILE * dt;
        p.x += DX[p.dir] * speed;
        p.y += DY[p.dir] * speed;

        // Check if reached next tile
        const targetCol = p.col + DX[p.dir];
        const targetRow = p.row + DY[p.dir];
        const targetX = targetCol * TILE;
        const targetY = FIELD_Y + targetRow * TILE;

        // Check if we've passed or reached the target
        if ((DX[p.dir] > 0 && p.x >= targetX) || (DX[p.dir] < 0 && p.x <= targetX) ||
            (DY[p.dir] > 0 && p.y >= targetY) || (DY[p.dir] < 0 && p.y <= targetY)) {
            p.col = targetCol;
            p.row = targetRow;
            snapToGrid(p);
            p.departed = false;
        }
    }

    // Ball regen
    if (!p.hasBall && !game.ball.active) {
        p.ballRegenTimer -= dt;
        if (p.ballRegenTimer <= 0) {
            p.hasBall = true;
        }
    }
}

// ============================================================
// BALL PHYSICS
// ============================================================
function throwBall() {
    const p = game.player;
    const b = game.ball;
    b.active = true;
    b.x = p.x + TILE / 2;
    b.y = p.y + TILE / 2;
    b.dir = p.dir !== DIR_NONE ? p.dir : DIR_RIGHT;
    b.bounces = 0;
    p.hasBall = false;
    p.ballUseCount++;
    p.ballRegenTimer = BALL_BASE_REGEN + p.ballUseCount * BALL_REGEN_INC;
    playSound('throw');
}

function updateBall(dt) {
    const b = game.ball;
    if (!b.active) return;

    const speed = BALL_SPEED * TILE * dt;
    b.x += DX[b.dir] * speed;
    b.y += DY[b.dir] * speed;

    // Get tile position
    const bCol = Math.floor(b.x / TILE);
    const bRow = Math.floor((b.y - FIELD_Y) / TILE);

    // Check wall/boundary collision
    if (b.x < 0 || b.x >= COLS * TILE || b.y < FIELD_Y || b.y >= FIELD_Y + ROWS * TILE) {
        b.dir = oppositeDir(b.dir);
        b.x = Math.max(4, Math.min(COLS * TILE - 4, b.x));
        b.y = Math.max(FIELD_Y + 4, Math.min(FIELD_Y + ROWS * TILE - 4, b.y));
        b.bounces++;
        playSound('bounce');
    }

    // Check dirt collision - look ahead
    const nextCol = Math.floor((b.x + DX[b.dir] * TILE * 0.4) / TILE);
    const nextRow = Math.floor((b.y + DY[b.dir] * TILE * 0.4 - FIELD_Y) / TILE);

    if (nextCol >= 0 && nextCol < COLS && nextRow >= 0 && nextRow < ROWS) {
        const nextTile = game.grid[nextRow][nextCol];
        if (nextTile === T_DIRT || nextTile === T_CHERRY) {
            // Try perpendicular directions first for more interesting bouncing
            const perp1 = (b.dir + 1) % 4;
            const perp2 = (b.dir + 3) % 4;
            const p1Col = bCol + DX[perp1];
            const p1Row = bRow + DY[perp1];
            const p2Col = bCol + DX[perp2];
            const p2Row = bRow + DY[perp2];

            let bounced = false;
            if (p1Col >= 0 && p1Col < COLS && p1Row >= 0 && p1Row < ROWS &&
                game.grid[p1Row][p1Col] === T_TUNNEL && Math.random() > 0.5) {
                b.dir = perp1;
                bounced = true;
            } else if (p2Col >= 0 && p2Col < COLS && p2Row >= 0 && p2Row < ROWS &&
                       game.grid[p2Row][p2Col] === T_TUNNEL) {
                b.dir = perp2;
                bounced = true;
            }

            if (!bounced) {
                b.dir = oppositeDir(b.dir);
            }
            b.bounces++;
            playSound('bounce');
        }
    }

    // Check enemy collision
    for (let i = game.enemies.length - 1; i >= 0; i--) {
        const e = game.enemies[i];
        if (e.dead) continue;
        const ex = e.x + TILE / 2;
        const ey = e.y + TILE / 2;
        const dist = Math.hypot(b.x - ex, b.y - ey);
        if (dist < TILE * 0.7) {
            killEnemy(i, 'ball');
            b.active = false;
            game.player.hasBall = true;
            game.player.ballRegenTimer = 0;
            return;
        }
    }

    // Ball expires after max bounces
    if (b.bounces >= BALL_MAX_BOUNCES) {
        b.active = false;
        // Player needs to wait for regen
    }
}

// ============================================================
// ENEMY AI
// ============================================================
function createEnemy(col, row, isAlpha, letter) {
    return {
        col, row,
        x: col * TILE,
        y: FIELD_Y + row * TILE,
        dir: DIR_NONE,
        speed: ENEMY_SPEED_BASE + Math.max(0, game.level - 1) * 0.08,
        isDigger: false,
        transformTimer: DIGGER_TRANSFORM_BASE - Math.max(0, game.level - 1) * 0.4 + Math.random() * 4,
        isAlpha: isAlpha || false,
        letter: letter || null,
        dead: false,
        path: [],
        pathTimer: 0,
        moving: false,
        animFrame: 0,
        animTimer: 0,
        stuckTimer: 0,
    };
}

function bfs(startCol, startRow, targetCol, targetRow, allowDirt) {
    const queue = [{ col: startCol, row: startRow, path: [] }];
    const visited = new Set();
    visited.add(startCol + ',' + startRow);

    while (queue.length > 0) {
        const curr = queue.shift();
        if (curr.col === targetCol && curr.row === targetRow) {
            return curr.path;
        }

        for (let d = 0; d < 4; d++) {
            const nc = curr.col + DX[d];
            const nr = curr.row + DY[d];
            const key = nc + ',' + nr;
            if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
            if (visited.has(key)) continue;

            const tile = game.grid[nr][nc];
            const apple = appleAt(nc, nr);
            if (apple) continue; // enemies avoid apples

            if (tile === T_TUNNEL || (allowDirt && (tile === T_DIRT || tile === T_CHERRY))) {
                visited.add(key);
                queue.push({ col: nc, row: nr, path: [...curr.path, { col: nc, row: nr }] });
            }
        }
    }
    return [];
}

function updateEnemies(dt) {
    const p = game.player;

    // Spawn
    if (game.generator.enemiesRemaining > 0) {
        game.spawnTimer -= dt;
        if (game.spawnTimer <= 0) {
            const e = createEnemy(game.generator.col, game.generator.row);
            game.enemies.push(e);
            game.generator.enemiesRemaining--;
            game.spawnTimer = SPAWN_INTERVAL_BASE - Math.max(0, game.level - 1) * 0.12;
            if (game.spawnTimer < 1.2) game.spawnTimer = 1.2;
            playSound('spawn');
        }
    }

    for (const e of game.enemies) {
        if (e.dead) continue;

        // Animation
        e.animTimer += dt;
        if (e.animTimer > 0.2) {
            e.animTimer = 0;
            e.animFrame = (e.animFrame + 1) % 2;
        }

        // Digger transformation
        if (!e.isDigger && !e.isAlpha) {
            e.transformTimer -= dt;
            if (e.transformTimer <= 0) {
                e.isDigger = true;
                e.speed = ENEMY_DIGGER_SPEED + Math.max(0, game.level - 1) * 0.06;
            }
        }

        // Alpha monster behavior
        if (e.isAlpha) {
            e.speed = ALPHA_SPEED;
            // Flee when player has ball, pursue when thrown
            // (simplified: just chase the player)
        }

        // Pathfinding
        e.pathTimer -= dt;
        if (e.pathTimer <= 0 || e.path.length === 0) {
            e.path = bfs(e.col, e.row, p.col, p.row, e.isDigger);
            e.pathTimer = 0.4 + Math.random() * 0.2;
        }

        // Follow path
        if (e.path.length > 0) {
            const target = e.path[0];
            const tx = target.col * TILE;
            const ty = FIELD_Y + target.row * TILE;

            // If digger and target is dirt, carve tunnel
            if (e.isDigger && game.grid[target.row][target.col] === T_DIRT) {
                game.grid[target.row][target.col] = T_TUNNEL;
            }

            const dx = tx - e.x;
            const dy = ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (dist < 2) {
                e.col = target.col;
                e.row = target.row;
                e.x = tx;
                e.y = ty;
                e.path.shift();
                e.stuckTimer = 0;
            } else {
                const spd = e.speed * TILE * dt;
                if (dist > 0) {
                    e.x += (dx / dist) * spd;
                    e.y += (dy / dist) * spd;
                }
                e.moving = true;
                // Update direction for rendering
                if (Math.abs(dx) > Math.abs(dy)) {
                    e.dir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
                } else {
                    e.dir = dy > 0 ? DIR_DOWN : DIR_UP;
                }
            }
        } else {
            e.stuckTimer += dt;
            // Random wander if stuck
            if (e.stuckTimer > 1) {
                const dirs = [];
                for (let d = 0; d < 4; d++) {
                    const nc = e.col + DX[d];
                    const nr = e.row + DY[d];
                    if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) {
                        if (game.grid[nr][nc] !== T_DIRT || e.isDigger) dirs.push(d);
                    }
                }
                if (dirs.length > 0) {
                    const d = dirs[Math.floor(Math.random() * dirs.length)];
                    e.path = [{ col: e.col + DX[d], row: e.row + DY[d] }];
                }
                e.stuckTimer = 0;
            }
        }

        // Player collision
        if (p.invincible <= 0) {
            const ex = e.x + TILE / 2;
            const ey = e.y + TILE / 2;
            const px = p.x + TILE / 2;
            const py = p.y + TILE / 2;
            if (Math.hypot(ex - px, ey - py) < TILE * 0.6) {
                killPlayer();
                return;
            }
        }
    }
}

function killEnemy(index, method) {
    const e = game.enemies[index];
    e.dead = true;
    game.totalEnemiesKilled++;

    if (method === 'ball') {
        game.score += e.isAlpha ? SCORE_ALPHA_KILL : SCORE_BALL_KILL;
    }

    if (e.isAlpha && e.letter) {
        collectExtraLetter(e.letter);
        game.alphaMonster = null;
    }

    playSound('enemyDie');
    const color = e.isAlpha ? '#4444FF' : (e.isDigger ? '#FF8800' : '#FF2222');
    spawnParticles(e.x + TILE / 2, e.y + TILE / 2, color, 15, 120, 0.5);

    // Remove dead enemies
    game.enemies.splice(index, 1);

    checkWinConditions();
}

function killPlayer() {
    if (game.state !== STATE_PLAYING) return;
    if (game.player.invincible > 0) return;
    game.state = STATE_DYING;
    game.stateTimer = 1.5;
    stopMusic();
    playSound('playerDie');
    spawnParticles(
        game.player.x + TILE / 2,
        game.player.y + TILE / 2,
        '#FFFFFF', 20, 150, 0.8
    );
}

// ============================================================
// APPLE PHYSICS
// ============================================================
function updateApples(dt) {
    for (let i = game.apples.length - 1; i >= 0; i--) {
        const a = game.apples[i];
        if (a.state === 'SHATTERED') continue;

        switch (a.state) {
            case 'SETTLED': {
                // Check if support removed
                const below = a.row + 1;
                if (below < ROWS) {
                    const tileBelow = game.grid[below][a.col];
                    const appleBelow = appleAt(a.col, below);
                    if (tileBelow === T_TUNNEL && !appleBelow) {
                        a.state = 'WOBBLING';
                        a.wobbleTimer = 0.6;
                        a.wobbleAnim = 0;
                        playSound('wobble');
                    }
                }
                break;
            }
            case 'WOBBLING': {
                a.wobbleTimer -= dt;
                a.wobbleAnim += dt * 15;
                if (a.wobbleTimer <= 0) {
                    a.state = 'FALLING';
                    a.fallSpeed = 0;
                    a.crushCount = 0;
                    a.fallStartRow = a.row;
                }
                break;
            }
            case 'FALLING': {
                a.fallSpeed += 500 * dt;
                a.y += a.fallSpeed * dt;

                const newRow = Math.floor((a.y - FIELD_Y) / TILE);

                // Check enemy collision
                for (let ei = game.enemies.length - 1; ei >= 0; ei--) {
                    const e = game.enemies[ei];
                    if (e.dead) continue;
                    if (e.isAlpha) continue; // alphas eat apples (simplified: just ignore)
                    if (Math.abs(a.x - e.x) < TILE * 0.6 &&
                        a.y + TILE > e.y && a.y < e.y + TILE) {
                        killEnemy(ei, 'apple');
                        a.crushCount++;
                    }
                }

                // Check player collision
                const p = game.player;
                if (p.invincible <= 0 &&
                    Math.abs(a.x - p.x) < TILE * 0.6 &&
                    a.y + TILE > p.y && a.y < p.y + TILE) {
                    killPlayer();
                }

                // Check landing
                let landed = false;
                if (newRow >= ROWS - 1) {
                    landed = true;
                    a.row = ROWS - 1;
                } else if (newRow > a.row) {
                    const tileBelow = game.grid[newRow + 1 < ROWS ? newRow + 1 : newRow][a.col];
                    const appleBelow = appleAt(a.col, newRow + 1);
                    if (tileBelow === T_DIRT || newRow + 1 >= ROWS || appleBelow) {
                        landed = true;
                        a.row = newRow;
                    }
                }

                if (landed) {
                    a.y = FIELD_Y + a.row * TILE;
                    if (a.crushCount > 0) {
                        const idx = Math.min(a.crushCount, 5);
                        game.score += APPLE_CRUSH_SCORES[idx];
                    }
                    const fallDist = a.row - a.fallStartRow;
                    if (fallDist > 2) {
                        a.state = 'SHATTERED';
                        spawnParticles(a.x + TILE / 2, a.y + TILE / 2, '#00BB00', 10, 80, 0.5);
                        playSound('appleCrush');
                    } else {
                        a.state = 'SETTLED';
                    }
                }
                break;
            }
            case 'PUSHED': {
                const speed = PLAYER_SPEED * TILE * dt;
                a.x += DX[a.pushDir] * speed;
                const targetX = a.pushTarget * TILE;

                if ((a.pushDir === DIR_RIGHT && a.x >= targetX) ||
                    (a.pushDir === DIR_LEFT && a.x <= targetX)) {
                    a.col = a.pushTarget;
                    a.x = a.col * TILE;
                    a.state = 'SETTLED';
                }
                break;
            }
        }
    }

    // Remove shattered apples after particles are done
    game.apples = game.apples.filter(a => a.state !== 'SHATTERED');
}

// ============================================================
// EXTRA SYSTEM
// ============================================================
function updateExtra(dt) {
    game.extraCycleTimer += dt;
    if (game.extraCycleTimer >= EXTRA_CYCLE_SPEED) {
        game.extraCycleTimer = 0;
        game.extraCycleIndex = (game.extraCycleIndex + 1) % 5;
    }

    // Alpha monster spawn check
    if (game.score >= game.nextAlphaScore && !game.alphaMonster && game.state === STATE_PLAYING) {
        spawnAlphaMonster();
        game.nextAlphaScore += 5000;
    }
}

function spawnAlphaMonster() {
    const letter = EXTRA_LETTERS[game.extraCycleIndex];
    // Spawn at a random edge
    let col, row;
    const edge = Math.floor(Math.random() * 4);
    switch (edge) {
        case 0: col = 0; row = Math.floor(Math.random() * ROWS); break;
        case 1: col = COLS - 1; row = Math.floor(Math.random() * ROWS); break;
        case 2: col = Math.floor(Math.random() * COLS); row = 0; break;
        case 3: col = Math.floor(Math.random() * COLS); row = ROWS - 1; break;
    }
    // Ensure spawn tile is a tunnel (find nearest)
    let best = null, bestDist = Infinity;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (game.grid[r][c] === T_TUNNEL) {
                const d = Math.hypot(c - col, r - row);
                if (d < bestDist) { bestDist = d; best = { col: c, row: r }; }
            }
        }
    }
    if (!best) return;

    const e = createEnemy(best.col, best.row, true, letter);
    game.enemies.push(e);
    game.alphaMonster = e;
}

function collectExtraLetter(letter) {
    const idx = EXTRA_LETTERS.indexOf(letter);
    if (idx >= 0) {
        game.extraLetters[idx] = true;
        playSound('extraLetter');

        if (game.extraLetters.every(v => v)) {
            game.lives++;
            game.extraLetters = [false, false, false, false, false];
            levelComplete('extra');
        }
    }
}

// ============================================================
// WIN CONDITIONS & GAME FLOW
// ============================================================
function checkWinConditions() {
    if (game.state !== STATE_PLAYING) return;

    // All cherries collected
    if (game.collectedCherries >= game.totalCherries && game.totalCherries > 0) {
        levelComplete('cherries');
        return;
    }

    // All enemies killed
    if (game.generator.enemiesRemaining <= 0 && game.enemies.filter(e => !e.dead).length === 0) {
        levelComplete('enemies');
        return;
    }
}

function levelComplete(reason) {
    if (game.state === STATE_LEVEL_COMPLETE) return;
    game.state = STATE_LEVEL_COMPLETE;
    game.stateTimer = 2.5;
    game.levelWinReason = reason;
    stopMusic();
    startMusic(FANFARE_MELODY, 200, false, 0.1);
}

function startGame() {
    resetGame();
    game.score = 0;
    game.lives = 3;
    game.level = 1;
    game.extraLetters = [false, false, false, false, false];
    game.nextAlphaScore = 5000;
    initLevel(1);
    game.state = STATE_READY;
    game.readyTimer = 1.5;
    stopMusic();
}

// ============================================================
// RENDERING
// ============================================================
function getLevelPalette() {
    return LEVEL_PALETTES[(game.level - 1) % LEVEL_PALETTES.length];
}

function renderDirt(col, row) {
    const pal = getLevelPalette();
    const x = col * TILE;
    const y = FIELD_Y + row * TILE;

    ctx.fillStyle = pal.dirt;
    ctx.fillRect(x, y, TILE, TILE);

    // Cross-hatch pattern
    ctx.fillStyle = pal.dirtAlt;
    for (let py = 0; py < TILE; py += 8) {
        for (let px = 0; px < TILE; px += 8) {
            if ((px + py) % 16 < 8) {
                ctx.fillRect(x + px, y + py, 4, 4);
            }
        }
    }

    // Subtle darker edge on bottom-right
    ctx.fillStyle = pal.dirtDark;
    ctx.fillRect(x + TILE - 2, y, 2, TILE);
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
}

function renderCherry(col, row) {
    const x = col * TILE + TILE / 2;
    const y = FIELD_Y + row * TILE + TILE / 2;
    const bob = Math.sin(game.time * 3 + col * 0.7 + row * 1.3) * 1.5;

    // Stem
    ctx.strokeStyle = '#00AA00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - 8 + bob);
    ctx.lineTo(x + 4, y - 16 + bob);
    ctx.stroke();

    // Cherry body (two cherries)
    ctx.fillStyle = '#FF0044';
    ctx.beginPath();
    ctx.arc(x - 5, y - 2 + bob, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 5, y - 2 + bob, 7, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = '#FF6688';
    ctx.beginPath();
    ctx.arc(x - 6, y - 5 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
}

function renderApple(apple) {
    if (apple.state === 'SHATTERED') return;
    const x = apple.x;
    const y = apple.y;

    // Wobble offset
    let wobbleX = 0;
    if (apple.state === 'WOBBLING') {
        wobbleX = Math.sin(apple.wobbleAnim) * 3;
    }

    drawSprite(x + wobbleX, y, SPRITE_APPLE, APPLE_PALETTE, 6);
}

function renderGenerator() {
    const g = game.generator;
    const x = g.col * TILE;
    const y = FIELD_Y + g.row * TILE;

    // Pulsing glow
    const pulse = 0.5 + 0.5 * Math.sin(game.time * 3);
    ctx.fillStyle = `rgba(255, 68, 68, ${0.1 + pulse * 0.15})`;
    ctx.fillRect(x - 6, y - 6, TILE + 12, TILE + 12);

    drawSprite(x, y, SPRITE_GENERATOR, GENERATOR_PALETTE, 6);

    // Enemy count indicator
    if (g.enemiesRemaining > 0) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(g.enemiesRemaining, x + TILE / 2, y + TILE + 16);
    }
}

function renderPlayer() {
    const p = game.player;
    if (game.state === STATE_DYING) {
        // Death flash
        if (Math.floor(game.stateTimer * 10) % 2) return;
    }

    if (p.invincible > 0 && Math.floor(p.invincible * 10) % 2) return;

    let sprite;
    switch (p.dir) {
        case DIR_UP: sprite = SPRITE_MRDO_UP; break;
        case DIR_DOWN: sprite = SPRITE_MRDO_DOWN; break;
        case DIR_LEFT: sprite = SPRITE_MRDO_LEFT; break;
        case DIR_RIGHT: default: sprite = SPRITE_MRDO_RIGHT; break;
    }

    // Walk animation: slight vertical bob
    const yOff = p.moving && p.animFrame ? -2 : 0;
    drawSprite(p.x, p.y + yOff, sprite, MRDO_PALETTES, 6);

    // Ball indicator
    if (p.hasBall) {
        ctx.fillStyle = '#00FFFF';
        ctx.beginPath();
        ctx.arc(p.x + TILE / 2, p.y - 6, 6, 0, Math.PI * 2);
        ctx.fill();
    }
}

function renderEnemy(e) {
    if (e.dead) return;

    let palette = ENEMY_PALETTE;
    if (e.isDigger) palette = DIGGER_PALETTE;
    if (e.isAlpha) palette = ALPHA_PALETTE;

    // Animation bob
    const yOff = e.animFrame ? -2 : 0;
    drawSprite(e.x, e.y + yOff, SPRITE_ENEMY, palette, 6);

    // Alpha letter overlay
    if (e.isAlpha && e.letter) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.letter, e.x + TILE / 2, e.y + TILE / 2);
    }
}

function renderBall() {
    const b = game.ball;
    if (!b.active) return;

    // Trail particles
    if (Math.random() > 0.3) {
        game.particles.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20,
            life: 0.2,
            maxLife: 0.2,
            color: '#00AAAA',
            size: 2,
        });
    }

    // Ball glow
    const glow = 0.5 + 0.5 * Math.sin(game.time * 12);
    ctx.fillStyle = `rgba(0, 255, 255, ${0.2 + glow * 0.2})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 14, 0, Math.PI * 2);
    ctx.fill();

    // Ball core
    ctx.fillStyle = '#00FFFF';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(b.x - 1, b.y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
}

function renderHUD() {
    // Top HUD bar
    ctx.fillStyle = '#111122';

    ctx.fillStyle = '#FFFFFF';

        ctx.font = `bold ${isActive ? 24 : 18}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(EXTRA_LETTERS[i], extraX + i * 30, HUD_H / 2 + (isActive ? 0 : 1));

function renderTitleScreen() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    // Animated stars background
    for (let i = 0; i < 30; i++) {
        const sx = ((i * 137 + game.time * 20 * (i % 3 + 1)) % W);
        const sy = ((i * 89 + game.time * 10 * (i % 2 + 1)) % (H - 100)) + 50;
        const brightness = 100 + Math.floor(Math.sin(game.time * 3 + i) * 80);
        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness + 50})`;
        ctx.fillRect(sx, sy, 2, 2);
    }

    // "MR." text — each letter a different color, arcade style
    const titleY = 100 + Math.sin(game.time * 1.5) * 6;
    const titleColors = ['#FF4444', '#FFFF44', '#44FF44', '#44FFFF', '#FF44FF', '#FF8844', '#4444FF'];
    const titleText = 'MR. DO!';
    ctx.font = 'bold 72px monospace';
    ctx.textBaseline = 'middle';

    // Shadow
    ctx.fillStyle = '#220000';
    ctx.textAlign = 'center';
    ctx.fillText(titleText, W / 2 + 4, titleY + 4);

    // Colored letters
    const metrics = ctx.measureText(titleText);
    let charX = W / 2 - metrics.width / 2;
    for (let i = 0; i < titleText.length; i++) {
        const ch = titleText[i];
        const colorIdx = (i + Math.floor(game.time * 2)) % titleColors.length;
        ctx.fillStyle = titleColors[colorIdx];
        ctx.textAlign = 'left';
        ctx.fillText(ch, charX, titleY);
        charX += ctx.measureText(ch).width;
    }

    // Subtitle line
    ctx.fillStyle = '#888888';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('UNIVERSAL  1982', W / 2, titleY + 50);

    // Mr. Do sprite — animated walking
    const walkFrame = Math.floor(game.time * 3) % 4;
    const sprites = [SPRITE_MRDO_DOWN, SPRITE_MRDO_RIGHT, SPRITE_MRDO_DOWN, SPRITE_MRDO_LEFT];
    const spriteY = 200 + (walkFrame % 2 ? -2 : 0);
    drawSprite(W / 2 - 36, spriteY, sprites[walkFrame], MRDO_PALETTES, 9);

    // Decorative row: enemies on each side
    const enemyBob = Math.sin(game.time * 4) * 3;
    drawSprite(W / 2 - 140, 210 + enemyBob, SPRITE_ENEMY, ENEMY_PALETTE, 6);
    drawSprite(W / 2 + 96, 210 - enemyBob, SPRITE_ENEMY, ENEMY_PALETTE, 6);

    // Cherries flanking
    for (let side = -1; side <= 1; side += 2) {
        const cx = W / 2 + side * 200;
        const cy = 230 + Math.sin(game.time * 2 + side) * 5;
        ctx.fillStyle = '#FF0044';
        ctx.beginPath(); ctx.arc(cx - 5, cy, 7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + 5, cy, 7, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#00AA00'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, cy - 7); ctx.lineTo(cx + 3, cy - 14); ctx.stroke();
    }

    // 1 PLAYER
    ctx.fillStyle = '#44FFFF';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('1 PLAYER', W / 2, 310);

    // High score table
    renderHighScoreTable(W / 2, 350, -1);

    // Controls
    ctx.fillStyle = '#555555';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS/WASD: Move  |  SPACE: Ball  |  P: Pause  |  M: Music', W / 2, 720);

    // Music status
    ctx.fillStyle = musicMuted ? '#553333' : '#336633';
    ctx.font = '12px monospace';
    ctx.fillText(musicMuted ? '\u266B MUSIC OFF' : '\u266B MUSIC ON', W / 2, 740);

    // Blink "PUSH START"
    if (Math.floor(game.time * 2) % 2) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 22px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PUSH START', W / 2, 770);
    }

    // Credit line
    ctx.fillStyle = '#444444';
    ctx.font = '12px monospace';
    ctx.fillText('CREDIT  1', W / 2, 800);
}

function renderHighScoreTable(cx, startY, highlightRank) {
    ctx.fillStyle = '#FF8800';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('HIGH SCORES', cx, startY);

    const colName = cx - 100;
    const colScore = cx + 40;
    const colLevel = cx + 140;

    ctx.fillStyle = '#888888';
    ctx.font = '13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('NAME', colName, startY + 28);
    ctx.textAlign = 'right';
    ctx.fillText('SCORE', colScore + 40, startY + 28);
    ctx.fillText('LVL', colLevel, startY + 28);

    for (let i = 0; i < highScores.length; i++) {
        const hs = highScores[i];
        const y = startY + 52 + i * 26;
        const isHighlight = i === highlightRank;

        ctx.fillStyle = isHighlight ? '#FFFF00' : '#CCCCCC';
        if (isHighlight) {
            ctx.fillStyle = (Math.floor(game.time * 3) % 2) ? '#FFFF00' : '#FFAA00';
        }
        ctx.font = isHighlight ? 'bold 16px monospace' : '16px monospace';

        ctx.textAlign = 'left';
        ctx.fillText(`${(i + 1).toString().padStart(2, ' ')}.`, colName - 32, y);
        ctx.fillText(hs.name, colName, y);
        ctx.textAlign = 'right';
        ctx.fillText(hs.score.toLocaleString(), colScore + 40, y);
        ctx.fillText(hs.level.toString(), colLevel, y);
    }
}

    ctx.fillStyle = '#FFFFFF';

function renderTouchControls() {
    if (!isTouchDevice) return;

    ctx.globalAlpha = 0.25;

    // D-pad (bottom-left)
    const dpadX = W * 0.18;
    const dpadY = H * 0.85;
    const dpadR = 55;

    // Background circle
    ctx.fillStyle = '#333333';
    ctx.beginPath();
    ctx.arc(dpadX, dpadY, dpadR + 10, 0, Math.PI * 2);
    ctx.fill();

    // Direction arrows
    ctx.fillStyle = '#FFFFFF';
    const arrowSize = 18;
    // Up
    ctx.beginPath();
    ctx.moveTo(dpadX, dpadY - dpadR + 5);
    ctx.lineTo(dpadX - arrowSize / 2, dpadY - dpadR + 5 + arrowSize);
    ctx.lineTo(dpadX + arrowSize / 2, dpadY - dpadR + 5 + arrowSize);
    ctx.fill();
    // Down
    ctx.beginPath();
    ctx.moveTo(dpadX, dpadY + dpadR - 5);
    ctx.lineTo(dpadX - arrowSize / 2, dpadY + dpadR - 5 - arrowSize);
    ctx.lineTo(dpadX + arrowSize / 2, dpadY + dpadR - 5 - arrowSize);
    ctx.fill();
    // Left
    ctx.beginPath();
    ctx.moveTo(dpadX - dpadR + 5, dpadY);
    ctx.lineTo(dpadX - dpadR + 5 + arrowSize, dpadY - arrowSize / 2);
    ctx.lineTo(dpadX - dpadR + 5 + arrowSize, dpadY + arrowSize / 2);
    ctx.fill();
    // Right
    ctx.beginPath();
    ctx.moveTo(dpadX + dpadR - 5, dpadY);
    ctx.lineTo(dpadX + dpadR - 5 - arrowSize, dpadY - arrowSize / 2);
    ctx.lineTo(dpadX + dpadR - 5 - arrowSize, dpadY + arrowSize / 2);
    ctx.fill();

    // Fire button (bottom-right)
    const fbX = W * 0.82;
    const fbY = H * 0.85;
    ctx.fillStyle = '#00AAAA';
    ctx.beginPath();
    ctx.arc(fbX, fbY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FIRE', fbX, fbY);

    ctx.globalAlpha = 1;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
    game.time += dt;
    game.flashTimer += dt;

    updateMusic(dt);

    switch (game.state) {
        case STATE_TITLE:
            if (!music.playing && !musicMuted) startTitleMusic();
            if (anyKeyPressed()) {
                startGame();
                Object.keys(keys).forEach(k => keys[k] = false);
                touchDir = DIR_NONE;
                touchFire = false;
            }
            break;

        case STATE_READY:
            game.readyTimer -= dt;
            if (game.readyTimer <= 0) {
                game.state = STATE_PLAYING;
                currentMelodyIndex = getMelodyForLevel(game.level);
                startGameplayMusic();
            }
            break;

        case STATE_PLAYING:
            updatePlayer(dt);
            updateBall(dt);
            updateEnemies(dt);
            updateApples(dt);
            updateExtra(dt);
            updateParticles(dt);
            checkWinConditions();
            break;

        case STATE_DYING:
            game.stateTimer -= dt;
            updateParticles(dt);
            if (game.stateTimer <= 0) {
                game.lives--;
                if (game.lives <= 0) {
                    const rank = getHighScoreRank(game.score);
                    if (rank >= 0) {
                        game.state = STATE_ENTER_NAME;
                        game.newHighScoreRank = rank;
                        game.nameEntry = { letters: ['A', 'A', 'A'], pos: 0, confirmed: false };
                    } else {
                        game.state = STATE_GAME_OVER;
                    }
                    game.stateTimer = 0;
                } else {
                    // Respawn player
                    const data = { pCol: 1, pRow: ROWS - 2 };
                    // Ensure respawn area is clear
                    game.grid[data.pRow][data.pCol] = T_TUNNEL;
                    game.player.col = data.pCol;
                    game.player.row = data.pRow;
                    game.player.x = data.pCol * TILE;
                    game.player.y = FIELD_Y + data.pRow * TILE;
                    game.player.dir = DIR_RIGHT;
                    game.player.moving = false;
                    game.player.departed = false;
                    game.player.hasBall = true;
                    game.player.ballUseCount = 0;
                    game.player.ballRegenTimer = 0;
                    game.player.invincible = 2.0;
                    game.ball.active = false;
                    game.state = STATE_PLAYING;
                    startGameplayMusic();
                }
            }
            break;

        case STATE_LEVEL_COMPLETE:
            game.stateTimer -= dt;
            updateParticles(dt);
            if (game.stateTimer <= 0) {
                game.level++;
                initLevel(game.level);
                game.state = STATE_READY;
                game.readyTimer = 1.5;
            }
            break;

        case STATE_ENTER_NAME:
            // Handled via keydown listener
            break;

        case STATE_GAME_OVER:
            game.stateTimer += dt;
            if (game.stateTimer > 0.5 && anyKeyPressed()) {
                stopMusic();
                resetGame();
                Object.keys(keys).forEach(k => keys[k] = false);
                touchDir = DIR_NONE;
                touchFire = false;
            }
            break;
    }
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
    ctx.clearRect(0, 0, W, H);

    if (game.state === STATE_TITLE) {
        renderTitleScreen();
        return;
    }

    // Fill background
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    // Render grid
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const tile = game.grid[r][c];
            if (tile === T_DIRT) {
                renderDirt(c, r);
            } else if (tile === T_CHERRY) {
                // Render dirt background then cherry
                renderDirt(c, r);
                renderCherry(c, r);
            }
            // TUNNEL = black (already background)
        }
    }

    // Player digging preview — show partial tunnel ahead
    if (game.player.moving && game.state === STATE_PLAYING) {
        const p = game.player;
        const nc = p.col + DX[p.dir];
        const nr = p.row + DY[p.dir];
        if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && game.grid[nr][nc] === T_DIRT) {
            // Carve a small preview tunnel in the direction of movement
            ctx.fillStyle = '#000000';
            const sx = nc * TILE;
            const sy = FIELD_Y + nr * TILE;
            if (p.dir === DIR_LEFT || p.dir === DIR_RIGHT) {
                const w = Math.abs(p.x - p.col * TILE);
                if (p.dir === DIR_RIGHT) {
                    ctx.fillRect(sx, sy + 4, w, TILE - 8);
                } else {
                    ctx.fillRect(sx + TILE - w, sy + 4, w, TILE - 8);
                }
            } else {
                const h = Math.abs(p.y - (FIELD_Y + p.row * TILE));
                if (p.dir === DIR_DOWN) {
                    ctx.fillRect(sx + 4, sy, TILE - 8, h);
                } else {
                    ctx.fillRect(sx + 4, sy + TILE - h, TILE - 8, h);
                }
            }
        }
    }

    // Apples
    for (const a of game.apples) renderApple(a);

    // Generator
    renderGenerator();

    // Enemies
    for (const e of game.enemies) renderEnemy(e);

    // Player
    if (game.state !== STATE_GAME_OVER) renderPlayer();

    // Ball
    renderBall();

    // Particles
    renderParticles();

    // HUD
    renderHUD();

    // Touch controls
    renderTouchControls();

    // State overlays
    if (game.state === STATE_GAME_OVER) renderGameOver();
    if (game.state === STATE_ENTER_NAME) renderEnterName();
    if (game.state === STATE_LEVEL_COMPLETE) renderLevelComplete();
    if (game.state === STATE_READY) renderReady();
    if (game.state === STATE_PAUSED) renderPaused();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTimestamp = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
    lastTimestamp = timestamp;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
}

resetGame();
requestAnimationFrame(gameLoop);

</script>
